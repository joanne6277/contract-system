name: Build and Deploy Versioned Prototype
on:
  push:
    tags:
      - 'v*' # 當推送 v 開頭的 tag 時觸發 (例如 v1.0.0)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Project
        # 關鍵：這裡會自動將版本號 (Tag) 注入 Vite 的 base 路徑
        run: npx vite build --base "/${{ github.event.repository.name }}/${{ github.ref_name }}/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist               # Vite 編譯後的資料夾
          branch: gh-pages           # 部署到的目標分支
          target-folder: ${{ github.ref_name }} # 放在以版本號命名的子資料夾
          clean: false               # 重要：設為 false 才不會刪除舊版本的資料夾